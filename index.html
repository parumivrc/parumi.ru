<style>:root{
  --bg:#0c0a0d; --bg-elev:#141016; --bg-code:#0e0a10; --panel:#16111a;

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(900px 500px at 82% -8%,rgba(255,61,110,.10),transparent 60%),radial-gradient(700px 600px at -10% 110%,rgba(189,155,242,.07),transparent 60%)}
body::after{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.035;background-image:repeating-linear-gradient(0deg,#fff 0 1px,transparent 1px 3px);mix-blend-mode:overlay}
.app{position:relative;z-index:1;display:grid;grid-template-columns:300px 1fr;min-height:100vh}
.side{position:sticky;top:0;height:100vh;overflow-y:auto;background:linear-gradient(180deg,var(--bg-elev),#0e0b11);border-right:1px solid var(--border);padding:22px 16px 40px}
.brand{display:flex;gap:12px;align-items:flex-start;padding:6px 8px 18px;cursor:pointer}
.brand .logo{width:38px;height:38px;flex:none;border-radius:9px;background:linear-gradient(145deg,var(--accent),#b51e44);display:grid;place-items:center;font-family:var(--mono);font-weight:800;color:#fff;box-shadow:0 0 0 1px rgba(255,255,255,.08),0 8px 24px -8px var(--accent)}
.brand h1{font-family:var(--mono);font-size:14px;font-weight:700;letter-spacing:.02em;line-height:1.25}
.brand span{display:block;font-size:11px;color:var(--faint);font-family:var(--mono);margin-top:3px}
.search{position:relative;margin:4px 6px 18px}
.search input{width:100%;background:var(--bg-code);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:12.5px;padding:9px 11px 9px 32px;border-radius:9px;outline:none;transition:.15s}
.search input:focus{border-color:var(--accent-dim);box-shadow:0 0 0 3px rgba(255,61,110,.10)}
.search svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--faint)}
.grp{margin-bottom:8px}
.grp-h{display:flex;align-items:center;gap:8px;padding:9px 10px;cursor:pointer;font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);border-radius:8px;user-select:none}
.grp-h:hover{color:var(--text)}
.grp-h .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent)}
.grp-h .chev{margin-left:auto;transition:.2s;color:var(--faint)}
.grp.collapsed .chev{transform:rotate(-90deg)}
.grp.collapsed .items{display:none}
.items{padding:3px 0 6px}
.nav{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:0;cursor:pointer;color:var(--dim);padding:8px 10px;border-radius:8px;position:relative;transition:.13s;font-family:var(--sans)}
.nav:hover{background:var(--border-soft);color:var(--text)}
.nav.active{background:linear-gradient(90deg,rgba(255,61,110,.14),transparent);color:#fff}
.nav.active::before{content:"";position:absolute;left:0;top:6px;bottom:6px;width:3px;border-radius:3px;background:var(--accent);box-shadow:0 0 10px var(--accent)}
.nav .ico{font-family:var(--mono);font-size:11px;font-weight:700;width:24px;height:24px;flex:none;border-radius:6px;display:grid;place-items:center;background:var(--bg-code);border:1px solid var(--border);color:var(--accent-2)}
.nav .tt{min-width:0}
.nav .tt b{display:block;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav .tt small{display:block;font-family:var(--mono);font-size:10px;color:var(--faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{margin-left:auto;font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:5px;letter-spacing:.05em;flex:none}
.b-chg{background:rgba(255,180,84,.14);color:var(--amber)}
.b-chk{background:rgba(86,214,160,.14);color:var(--green)}
.b-yml{background:rgba(90,200,250,.14);color:var(--cyan)}
.main{min-width:0;padding:0 0 80px}
.topbar{position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:14px;padding:14px 34px;background:rgba(12,10,13,.78);backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
.crumbs{font-family:var(--mono);font-size:12px;color:var(--faint);display:flex;gap:8px;align-items:center}
.crumbs b{color:var(--accent-2);font-weight:600}
.crumbs .sep{opacity:.4}
.tb-right{margin-left:auto;display:flex;gap:10px;align-items:center}
.menu-btn{display:none}
.wrap{max-width:980px;margin:0 auto;padding:38px 34px 0}
.hero{padding:10px 0 30px;border-bottom:1px solid var(--border-soft);margin-bottom:34px}
.eyebrow{font-family:var(--mono);font-size:11.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);margin-bottom:16px}
.hero h2{font-family:var(--mono);font-size:32px;line-height:1.18;font-weight:800;letter-spacing:-.01em;margin-bottom:14px}
.hero h2 .v{color:var(--accent)}
.hero p{color:var(--dim);max-width:62ch;font-size:15.5px}
.meta-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:22px}
.chip{font-family:var(--mono);font-size:11.5px;padding:7px 12px;border-radius:8px;background:var(--bg-elev);border:1px solid var(--border);color:var(--dim)}
.chip b{color:var(--text)}
.sec-t{font-family:var(--mono);font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin:38px 0 16px;display:flex;align-items:center;gap:10px}
.sec-t::after{content:"";flex:1;height:1px;background:var(--border-soft)}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.card{background:linear-gradient(160deg,var(--panel),var(--bg-elev));border:1px solid var(--border);border-radius:14px;padding:20px;cursor:pointer;transition:.16s;position:relative;overflow:hidden}
.card:hover{border-color:var(--accent-dim);transform:translateY(-2px)}
.card:hover .arr{transform:translate(3px,-3px);color:var(--accent)}
.card .k{font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:.12em;text-transform:uppercase}
.card h3{font-size:18px;margin:10px 0 8px;font-weight:700}
.card p{font-size:13px;color:var(--dim)}
.card .arr{position:absolute;top:18px;right:18px;color:var(--faint);transition:.18s}
.card .files{margin-top:14px;display:flex;flex-wrap:wrap;gap:6px}

table.kv{width:100%;border-collapse:collapse;font-size:13.5px;margin-top:4px;border:1px solid var(--border);border-radius:12px;overflow:hidden}

table.kv tr:last-child td{border-bottom:0}
table.kv td:first-child{font-family:var(--mono);color:var(--text)}
table.kv .old{color:var(--faint);font-family:var(--mono)}
table.kv .new{color:var(--accent-2);font-family:var(--mono);font-weight:600}
.topo{margin-top:6px;background:linear-gradient(160deg,var(--panel),#0e0b11);border:1px solid var(--border);border-radius:14px;padding:20px}
.fhead{display:flex;align-items:center;gap:14px;margin-bottom:6px}

.fhead h2{font-family:var(--mono);font-size:22px;font-weight:700}
.fhead small{font-family:var(--mono);font-size:12px;color:var(--faint);display:block;margin-top:2px}
.term{margin-top:20px;background:var(--bg-code);border:1px solid var(--border);border-radius:13px;overflow:hidden;box-shadow:0 24px 60px -30px rgba(0,0,0,.8)}
.term-bar{display:flex;align-items:center;gap:8px;padding:11px 15px;background:linear-gradient(180deg,#191219,#120d15);border-bottom:1px solid var(--border)}

.term-bar .lights i{width:11px;height:11px;border-radius:50%;display:block}
.l1{background:#ff5f57}.l2{background:#febc2e}.l3{background:#28c840}
.term-bar .path{font-family:var(--mono);font-size:12px;color:var(--faint);margin-left:6px}
.term-bar .path b{color:var(--accent-2)}
.copy{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--dim);background:var(--bg-elev);border:1px solid var(--border);padding:6px 11px;border-radius:7px;cursor:pointer;transition:.14s;display:flex;align-items:center;gap:6px}
.copy:hover{color:var(--text);border-color:var(--accent-dim)}
.copy.done{color:var(--green);border-color:rgba(86,214,160,.4)}
.code{display:flex;font-family:var(--mono);font-size:13px;line-height:1.7;overflow-x:auto}
.gutter{flex:none;text-align:right;padding:18px 12px 18px 16px;color:#3c3444;user-select:none;border-right:1px solid var(--border-soft);background:rgba(0,0,0,.18)}
.gutter span{display:block}
.lines{padding:18px 20px;white-space:pre;min-width:0}
.lines .ln{display:block;min-height:1.7em}
.lines .ln:hover{background:rgba(255,61,110,.05)}
.c-banner{color:var(--accent);font-weight:700}
.c-sub{color:var(--violet);font-weight:600}
.c-plus{color:var(--accent-dim)}
.c-com{color:#5b5266;font-style:italic}
.c-warn{color:var(--amber)}
.c-cmd{color:var(--accent-2);font-weight:600}
.c-str{color:var(--green)}
.c-num{color:var(--cyan)}
.c-flag{color:var(--violet)}
.c-op{color:var(--dim)}
.foot{max-width:980px;margin:46px auto 0;padding:22px 34px 0;border-top:1px solid var(--border-soft);font-family:var(--mono);font-size:11.5px;color:var(--faint);display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px}
@media(max-width:860px){

  .scrim.show{display:block}
  .wrap,.topbar{padding-left:18px;padding-right:18px}
}

<script id="appdata" type="application/json">[{"module": "Модуль 1", "files": [{"file": "ПРОВЕРКА_Модуль1.txt", "raw": "#U041f#U0420#U041e#U0412#U0415#U0420#U041a#U0410_#U041c#U043e#U0434#U0443#U043b#U044c1.txt", "content": "====================================================\nПРОВЕРКА МОДУЛЬ 1 — Вариант 4\n====================================================\n\n========================================\n1.1 NAT и маршрутизация на ISP\n========================================\n[ISP]\nsystemctl status nftables\nnft list ruleset\nsysctl net.ipv4.ip_forward\n\n# Ожидание: ip_forward=1, masquerade на enp7s1\n\n========================================\n1.2 IP-адреса и имена устройств\n========================================\n[ALL — на каждой машине]\nhostname\nip -br a\ntimedatectl | grep \"Time zone\"\n\n# Ожидание:\n# ISP          — hostname: ISP\n# HQ-RTR       — hq-rtr.au-team.irpo\n# BR-RTR       — br-rtr.au-team.irpo\n# HQ-SRV       — HQ-SRV.au-team.irpo, 192.168.100.2/27\n# BR-SRV       — BR-SRV.au-team.irpo, 192.168.3.2/28\n# HQ-CLI       — HQ-CLI.au-team.irpo, 192.168.200.2/27\n# Время: Europe/Moscow на всех\n\n========================================\n1.3 Подсети (расчёт масок)\n========================================\n# Проверяем что маски соответствуют заданию:\n# VLAN 114 (HQ-SRV):  /27 — не более 32 адресов\n# VLAN 214 (HQ-CLI):  /27 — не менее 16 адресов\n# VLAN 814 (mgmt):    /29 — не более 8 адресов\n# BR-SRV:             /28 — не более 16 адресов\n\n[HQ-RTR]\nip -br a | grep -E 'vlan|enp'\n\n[HQ-SRV]\nip -br a\n\n[HQ-CLI]\nip -br a\n\n[BR-SRV]\nip -br a\n\n========================================\n1.4 Подинтерфейсы (VLAN) на HQ-RTR\n========================================\n[HQ-RTR]\nip -br a\ncat /etc/net/ifaces/vlan114/options\ncat /etc/net/ifaces/vlan214/options\ncat /etc/net/ifaces/vlan814/options\n\n# Ожидание: TYPE=vlan, HOST=enp7s2, VID=114/214/814\n\n========================================\n1.5 DHCP на HQ-RTR (для HQ-CLI)\n========================================\n[HQ-RTR]\nsystemctl status dnsmasq\ncat /etc/dnsmasq.conf\nss -lun | grep 67\n\n# Ожидание: interface=vlan214, dhcp-option=3 (шлюз 192.168.200.1),\n#           dhcp-option=6 (DNS 192.168.100.2), суффикс au-team.irpo\n\n[HQ-CLI]\nip -br a\ncat /etc/resolv.conf\n# Ожидание: адрес 192.168.200.2, шлюз 192.168.200.1, DNS 192.168.100.2\n\n========================================\n1.6 GRE туннель HQ-RTR <-> BR-RTR\n========================================\n[HQ-RTR]\nip -br a | grep gre\nping 10.10.10.2 -c 3\n\n[BR-RTR]\nip -br a | grep gre\nping 10.10.10.1 -c 3\n\ncat /etc/net/ifaces/gre1/options\n# Ожидание: TUNLOCAL=172.16.70.2, TUNREMOTE=172.16.80.2 (на HQ-RTR)\n#           TUNLOCAL=172.16.80.2, TUNREMOTE=172.16.70.2 (на BR-RTR)\n\n========================================\n1.7 NAT на HQ-RTR и BR-RTR (доступ в интернет)\n========================================\n[HQ-SRV]\nping 8.8.8.8 -c 3\nping zz.ru -c 3\n\n[HQ-CLI]\nping 8.8.8.8 -c 3\n\n[BR-SRV]\nping 8.8.8.8 -c 3\n\n[HQ-RTR]\nnft list ruleset\n# Ожидание: masquerade oifname enp7s1\n\n[BR-RTR]\nnft list ruleset\n# Ожидание: masquerade oifname enp7s1\n\n========================================\n1.8 Динамическая маршрутизация OSPF\n========================================\n[HQ-RTR]\nsystemctl status frr\nvtysh -c \"show ip ospf neighbor\"\nvtysh -c \"show ip route ospf\"\nip r | grep ospf\n\n[BR-RTR]\nvtysh -c \"show ip ospf neighbor\"\nvtysh -c \"show ip route ospf\"\n\n# Проверка связности между офисами:\n[HQ-SRV]\nping 192.168.3.2 -c 3    # BR-SRV\n\n[BR-SRV]\nping 192.168.100.2 -c 3  # HQ-SRV\n\n# Ожидание: passive-interface default, активен только gre1,\n#           аутентификация P@ssw0rd\n\n========================================\n1.9 SSH на HQ-SRV и BR-SRV\n========================================\n[HQ-SRV]\nss -ltnp | grep sshd\n# Ожидание: порт 2014\n\ngrep -E 'Port|MaxAuthTries|AllowUsers|Banner' /etc/openssh/sshd_config\ncat /etc/openssh/banner\n\n# Тест подключения:\nssh sshuser@127.0.0.1 -p 2014\n\n[BR-SRV]\nss -ltnp | grep sshd\ngrep -E 'Port|MaxAuthTries|AllowUsers|Banner' /etc/openssh/sshd_config\n\n========================================\n1.10 Локальные учётные записи\n========================================\n[HQ-SRV и BR-SRV]\nid sshuser\n# Ожидание: uid=2014\n\nsudo -l -U sshuser\n# Ожидание: NOPASSWD: ALL\n\n[HQ-RTR и BR-RTR]\nid net_admin\nsudo -l -U net_admin\n# Ожидание: NOPASSWD: ALL\n\n========================================\n1.11 DNS (BIND9 на HQ-SRV)\n========================================\n[HQ-SRV]\nsystemctl status bind\nnamed-checkconf /etc/bind/options.conf\nnamed-checkzone au-team.irpo /etc/bind/zone/au-team.irpo\nnamed-checkzone 168.192.in-addr.arpa /etc/bind/zone/168.192.in-addr.arpa\n\n# Прямые записи:\nhost hq-rtr.au-team.irpo 127.0.0.1\nhost hq-srv.au-team.irpo 127.0.0.1\nhost hq-cli.au-team.irpo 127.0.0.1\nhost br-rtr.au-team.irpo 127.0.0.1\nhost br-srv.au-team.irpo 127.0.0.1\nhost docker.au-team.irpo 127.0.0.1\nhost web.au-team.irpo 127.0.0.1\n\n# Обратные записи (PTR):\nhost -t PTR 192.168.100.1 127.0.0.1\nhost -t PTR 192.168.100.2 127.0.0.1\nhost -t PTR 192.168.200.2 127.0.0.1\n\n# Форвардинг (внешнее имя):\nhost zz.ru 127.0.0.1\n\n# Проверка с других машин:\n[BR-SRV]\nhost hq-srv\nhost br-rtr\n\n========================================\n1.12 Временная зона\n========================================\n[ALL — на каждой машине]\ntimedatectl | grep \"Time zone\"\n# Ожидание: Europe/Moscow на ISP, HQ-RTR, BR-RTR, HQ-SRV, BR-SRV, HQ-CLI\n"}, {"file": "00_ИЗМЕНЕНИЯ_Вариант4.txt", "raw": "00_#U0418#U0417#U041c#U0415#U041d#U0415#U041d#U0418#U042f_#U0412#U0430#U0440#U0438#U0430#U043d#U04424.txt", "content": "====================================================\nИЗМЕНЕНИЯ: Вариант 4 (В4_КОД 09.02.06-1-2026-БУ)\nvs старые инструкции\n====================================================\n\n========================================\n1. ISP — изменились WAN-подсети\n========================================\n\n  Было:\n    enp7s2 (к HQ-RTR): 172.16.1.1/28\n    enp7s3 (к BR-RTR): 172.16.2.1/28\n\n  Стало:\n    enp7s2 (к HQ-RTR): 172.16.70.1/28   ← docker.au-team.irpo\n    enp7s3 (к BR-RTR): 172.16.80.1/28   ← web.au-team.irpo\n\nФайл: 01_ISP.txt\n\n========================================\n2. HQ-RTR — VLAN номера и WAN-адрес\n========================================\n\n  VLAN (старые → новые):\n    vlan100 → vlan114   (HQ-SRV, /27)\n    vlan200 → vlan214   (HQ-CLI, /28)\n    vlan999 → vlan814   (управление, /29)\n\n  WAN-адрес (к ISP):\n    Было:  172.16.1.2/28, gateway 172.16.1.1\n    Стало: 172.16.70.2/28, gateway 172.16.70.1\n\n  GRE туннель:\n    TUNLOCAL: 172.16.70.2  (было 172.16.1.2)\n    TUNREMOTE: 172.16.80.2 (было 172.16.2.2)\n\n  OSPF frr.conf: vlan114, vlan214, vlan814 вместо vlan100/200/999\n\n  dnsmasq: interface=vlan214 вместо vlan200,\n           listen-address=192.168.200.1,\n           dhcp-range для vlan214\n\nФайл: 03_HQ-RTR.txt\n\n========================================\n3. BR-RTR — WAN-адрес\n========================================\n\n  Было:  172.16.2.2/28, gateway 172.16.2.1\n  Стало: 172.16.80.2/28, gateway 172.16.80.1\n\n  GRE туннель:\n    TUNLOCAL:  172.16.80.2 (было 172.16.2.2)\n    TUNREMOTE: 172.16.70.2 (было 172.16.1.2)\n\nФайл: 02_BR-RTR.txt\n\n========================================\n4. HQ-SRV — VLAN тег, SSH порт, UID, DNS-записи\n========================================\n\n  Proxmox: тег интерфейса VLAN 114 (было 100)\n\n  SSH порт:\n    Было:  Port 2026\n    Стало: Port 2014\n\n  UID пользователя sshuser:\n    Было:  -u 2026\n    Стало: -u 2014\n\n  DNS-зона au-team.irpo:\n    docker: 172.16.70.1 (было 172.16.1.1)\n    web:    172.16.80.1 (было 172.16.2.1)\n\nФайл: 04_HQ-SRV.txt\n\n========================================\n5. BR-SRV — SSH порт и UID\n========================================\n\n  SSH порт:\n    Было:  Port 2026\n    Стало: Port 2014\n\n  UID пользователя sshuser:\n    Было:  -u 2026\n    Стало: -u 2014\n\nФайл: 05_BR-SRV_HQ-CLI.txt\n\n========================================\n6. HQ-CLI — VLAN тег\n========================================\n\n  Proxmox: тег интерфейса VLAN 214 (было 200)\n\nФайл: 05_BR-SRV_HQ-CLI.txt\n\n========================================\nИТОГО — быстрая шпаргалка\n========================================\n\n  Параметр              Старое       Новое (В4)\n  ─────────────────────────────────────────────\n  ISP → HQ-RTR сеть    172.16.1.x   172.16.70.x\n  ISP → BR-RTR сеть    172.16.2.x   172.16.80.x\n  VLAN HQ-SRV          100          114\n  VLAN HQ-CLI          200          214\n  VLAN управления      999          814\n  SSH порт             2026         2014\n  UID sshuser          2026         2014\n  DNS docker           172.16.1.1   172.16.70.1\n  DNS web              172.16.2.1   172.16.80.1\n"}, {"file": "01_ISP.txt", "raw": "01_ISP.txt", "content": "==========ISP==========\n[Вариант 4 | В4_КОД 09.02.06-1-2026-БУ]\n\nroot/toor\n\n-------имя хоста---------\nhostnamectl hostname ISP\nexec bash\n\n-------настройка ВНЕШНЕГО интерфейса---------\n\ncat /etc/net/ifaces/enp7s1/options\n# enp7s1 — интерфейс в сторону Интернет, адрес по DHCP (преднастроен)\n\n-------настройка ВНУТРЕННИХ интерфейсов---------\n\nmkdir -p /etc/net/ifaces/enp7s{2,3}\n\necho 'TYPE=eth' | tee /etc/net/ifaces/enp7s{2,3}/options\n\n# ИЗМЕНЕНО (Вариант 4): сети к HQ-RTR и BR-RTR сменились\necho '172.16.70.1/28' > /etc/net/ifaces/enp7s2/ipv4address    # к HQ-RTR\necho '172.16.80.1/28' > /etc/net/ifaces/enp7s3/ipv4address    # к BR-RTR\n\n-------настройка NAT---------\n\napt-get update && apt-get install nftables -y\n\n+++\ncat << EOF > /etc/nftables/nftables.nft\n#!/usr/sbin/nft -f\nflush ruleset\ntable ip nat {\n chain postrouting {\n type nat hook postrouting priority srcnat;\n oifname \"enp7s1\"  masquerade\n }\n}\nEOF\n+++\n\ncat /etc/nftables/nftables.nft\n\nsystemctl enable --now nftables\n\n-------включение маршрутизации---------\nДВА РАЗА ВВОДИ КОМАНДУ МОЖЕТ НЕ ЗАРАБОТАТЬ BR-RTR\nsed -i 's/net.ipv4.ip_forward = 0/net.ipv4.ip_forward = 1/' /etc/net/sysctl.conf\nsystemctl restart network\nsysctl net.ipv4.ip_forward\n\n# Проверка: HQ-RTR и BR-RTR должны выйти в интернет через NAT на enp7s1\n"}, {"file": "02_BR-RTR.txt", "raw": "02_BR-RTR.txt", "content": "==========BR-RTR====\n[Вариант 4 | В4_КОД 09.02.06-1-2026-БУ]\n\nroot/toor\n\n-------имя хоста---------\nhostnamectl hostname br-rtr.au-team.irpo\nexec bash\n\n+++++++++++NETWORK++++++++++++++++++++++++\n\nmkdir -p /etc/net/ifaces/{enp7s{1,2},gre1}\necho 'TYPE=eth' | tee /etc/net/ifaces/enp7s{1,2}/options\n\n\n-------to ISP------\n# ИЗМЕНЕНО (Вариант 4): сеть к ISP теперь 172.16.80.0/28\necho '172.16.80.2/28' > /etc/net/ifaces/enp7s1/ipv4address\necho 'default via 172.16.80.1' > /etc/net/ifaces/enp7s1/ipv4route\necho 'nameserver 8.8.8.8' > /etc/net/ifaces/enp7s1/resolv.conf\n\n-------to BR-SRV---\n# Сеть к BR-SRV: не более 16 адресов → /28\necho '192.168.3.1/28' > /etc/net/ifaces/enp7s2/ipv4address\n\n-------включение маршрутизации---------\n\nsed -i 's/net.ipv4.ip_forward = 0/net.ipv4.ip_forward = 1/' /etc/net/sysctl.conf\n\n-------GRE-----------------------------\n# GRE туннель HQ-RTR <-> BR-RTR\n# TUNLOCAL и TUNREMOTE обновлены под новые WAN-адреса\n\n+++\ncat << EOF > /etc/net/ifaces/gre1/options\nTYPE=iptun\nTUNTYPE=gre\nTUNLOCAL=172.16.80.2\nTUNREMOTE=172.16.70.2\nTUNTTL=64\nTUNOPTIONS='ttl 64'\nEOF\n+++\n\ncat /etc/net/ifaces/gre1/options\n\necho \"10.10.10.2/30\" > /etc/net/ifaces/gre1/ipv4address\n\nsystemctl restart network\nip -br -c a\n\n\n-------установка необходимого ПО-------\n\napt-get update && apt-get install sudo tzdata frr nftables -y\n\n--------смена DNS-----------\nrm -f /etc/net/ifaces/enp7s1/resolv.conf\necho $'search au-team.irpo\\nnameserver 192.168.100.2' > /etc/net/ifaces/enp7s2/resolv.conf\n\n--------NAT-----------------\n\n+++\ncat << EOF > /etc/nftables/nftables.nft\n#!/usr/sbin/nft -f\nflush ruleset\ntable ip nat {\n chain postrouting {\n type nat hook postrouting priority srcnat;\n oifname \"enp7s1\"  masquerade\n }\n}\nEOF\n+++\n\n--------TIMEZONE----------\ntimedatectl set-timezone Europe/Kaliningrad\n\n-------настройка net_admin-------------\nuseradd net_admin\necho \"net_admin:P@ssw0rd\" | chpasswd\nusermod -aG wheel net_admin\necho \"WHEEL_USERS ALL=(ALL:ALL) NOPASSWD: ALL\" > /etc/sudoers.d/net_admin\nsu -l net_admin\nsudo id\n\n--------OSPF--------------\nsed -i 's/ospfd=no/ospfd=yes/' /etc/frr/daemons ; grep ospf /etc/frr/daemons\n\n+++\ncat <<'EOF' > /etc/frr/frr.conf\ninterface gre1\n no ip ospf passive\nexit\n!\ninterface gre1\n ip ospf area 0\n ip ospf authentication\n ip ospf authentication-key P@ssw0rd\n no ip ospf passive\nexit\n!\ninterface enp7s2\n ip ospf area 0\nexit\n!\nrouter ospf\n passive-interface default\nexit\nEOF\n+++\n\nsystemctl restart network\nsystemctl enable --now nftables frr\ncat /etc/resolv.conf\nip r\n"}, {"file": "03_HQ-RTR.txt", "raw": "03_HQ-RTR.txt", "content": "==========HQ-RTR=======\n[Вариант 4 | В4_КОД 09.02.06-1-2026-БУ]\n\nroot/toor\n\n-------имя хоста---------\nhostnamectl hostname hq-rtr.au-team.irpo\nexec bash\n\n+++++++++++NETWORK++++++++++++++++++++++++\n\n# ИЗМЕНЕНО (Вариант 4): VLAN номера изменились:\n#   HQ-SRV → VLAN 114 (было 100)\n#   HQ-CLI → VLAN 214 (было 200)\n#   Управление → VLAN 814 (было 999)\n\nmkdir -p /etc/net/ifaces/{enp7s{1,2},vlan{114,214,814},gre1}\necho 'TYPE=eth' | tee /etc/net/ifaces/enp7s{1,2}/options\n\n\n-------to ISP------\n# ИЗМЕНЕНО: сеть к ISP теперь 172.16.70.0/28\necho '172.16.70.2/28' > /etc/net/ifaces/enp7s1/ipv4address\necho 'default via 172.16.70.1' > /etc/net/ifaces/enp7s1/ipv4route\necho 'nameserver 8.8.8.8' > /etc/net/ifaces/enp7s1/resolv.conf\n\n--------настройка VLAN-----------\n# ИЗМЕНЕНО: VID 114, 214, 814\n\necho $'114\\n214\\n814' | xargs -i bash -c 'echo -e \"TYPE=vlan\\nHOST=enp7s2\\nVID={}\" > /etc/net/ifaces/vlan{}/options'\n\ncat /etc/net/ifaces/vlan814/options\n\n# Адресация:\n# VLAN 114 (HQ-SRV): не более 32 адресов → /27 (30 хостов)\n# VLAN 214 (HQ-CLI): не менее 16 адресов → /28 (14 хостов) — если строго \"не менее 16\", берём /27\n# VLAN 814 (управление): не более 8 адресов → /29 (6 хостов)\n#\n# Используем те же подсети что в старых инструкциях (совместимость с DNS-записями):\necho '192.168.100.1/27' > /etc/net/ifaces/vlan114/ipv4address\necho '192.168.200.1/28' > /etc/net/ifaces/vlan214/ipv4address\necho '192.168.99.1/29'  > /etc/net/ifaces/vlan814/ipv4address\n\n-------включение маршрутизации---------\n\nsed -i 's/net.ipv4.ip_forward = 0/net.ipv4.ip_forward = 1/' /etc/net/sysctl.conf\n\n-------GRE-----------------------------\n# TUNLOCAL / TUNREMOTE обновлены под новые WAN-адреса\n\n+++\ncat << EOF > /etc/net/ifaces/gre1/options\nTYPE=iptun\nTUNTYPE=gre\nTUNLOCAL=172.16.70.2\nTUNREMOTE=172.16.80.2\nTUNOPTIONS='ttl 64'\nEOF\n+++\n\ncat /etc/net/ifaces/gre1/options\n\necho \"10.10.10.1/30\" > /etc/net/ifaces/gre1/ipv4address\n\nsystemctl restart network\n\nip -br -c a\nping 10.10.10.2 -c 3\n#ПИНГ БУДЕТ ПОСЛЕ СМЕНЫ DNS\nping zz.ru -c 2\n\n-------установка необходимого ПО-------\n\napt-get update && apt-get install sudo tzdata frr dnsmasq nftables -y\n\n--------смена DNS-----------\nrm -f /etc/net/ifaces/enp7s1/resolv.conf\necho $'search au-team.irpo\\nnameserver 192.168.100.2' > /etc/net/ifaces/vlan114/resolv.conf\n\n--------NAT-----------------\n\n+++\ncat << EOF > /etc/nftables/nftables.nft\n#!/usr/sbin/nft -f\nflush ruleset\ntable ip nat {\n chain postrouting {\n type nat hook postrouting priority srcnat\n oifname \"enp7s1\" masquerade\n }\n}\nEOF\n+++\n\nsystemctl enable --now nftables\n\n--------TIMEZONE----------\ntimedatectl set-timezone Europe/Kaliningrad\n\n-------настройка net_admin-------------\nuseradd net_admin\necho \"net_admin:P@ssw0rd\" | chpasswd\nusermod -aG wheel net_admin\necho \"WHEEL_USERS ALL=(ALL:ALL) NOPASSWD: ALL\" > /etc/sudoers.d/net_admin\nsu -l net_admin\nsudo id\n\n--------OSPF--------------\nsed -i 's/ospfd=no/ospfd=yes/' /etc/frr/daemons ; grep ospf /etc/frr/daemons\n\n# ИЗМЕНЕНО: интерфейсы VLAN переименованы (114, 214, 814)\n\n+++\ncat <<'EOF' > /etc/frr/frr.conf\ninterface gre1\n no ip ospf passive\nexit\n!\ninterface gre1\n ip ospf area 0\n ip ospf authentication\n ip ospf authentication-key P@ssw0rd\n no ip ospf passive\nexit\n!\ninterface vlan114\n ip ospf area 0\nexit\n!\ninterface vlan214\n ip ospf area 0\nexit\n!\ninterface vlan814\n ip ospf area 0\nexit\n!\nrouter ospf\n passive-interface default\nexit\nEOF\n+++\n\n\n--------DHCP------------\n# ИЗМЕНЕНО: интерфейс vlan214 вместо vlan200\n\nsed -i 's/AUTO_LOCAL_RESOLVER=yes/AUTO_LOCAL_RESOLVER=no/' /etc/sysconfig/dnsmasq ; grep AUTO_LOCAL_RESOLVER /etc/sysconfig/dnsmasq\n\n+++\ncat <<'EOF' > /etc/dnsmasq.conf\nport=0\ninterface=vlan214\nlisten-address=192.168.200.1\ndhcp-authoritative\ndhcp-range=interface:vlan214,192.168.200.2,192.168.200.2,255.255.255.240,6h\ndhcp-option=3,192.168.200.1\ndhcp-option=6,192.168.100.2\nleasefile-ro\nEOF\n+++\n\nsystemctl enable --now frr dnsmasq ; ss -lun | grep 67\n\nsystemctl restart network\ncat /etc/resolv.conf\nip r | grep ospf\n"}, {"file": "04_HQ-SRV.txt", "raw": "04_HQ-SRV.txt", "content": "==========HQ-SRV==========\n[Вариант 4 | В4_КОД 09.02.06-1-2026-БУ]\n\n# ВАЖНО: СТАВИМ ТЕГ VLAN 114 НА ИНТЕРФЕЙС В PROXMOX (было 100)\n\nroot/toor\n\n-------имя хоста/NTP---------\nhostnamectl hostname HQ-SRV.au-team.irpo\nexec bash\ntimedatectl set-timezone Europe/Kaliningrad\n\n-------настройка интерфейсов-------------\n\necho 'TYPE=eth' > /etc/net/ifaces/enp7s1/options\necho '192.168.100.2/27' > /etc/net/ifaces/enp7s1/ipv4address\necho 'default via 192.168.100.1' > /etc/net/ifaces/enp7s1/ipv4route\necho 'nameserver 8.8.8.8' > /etc/net/ifaces/enp7s1/resolv.conf\nsystemctl restart network\nping zz.ru -c3\n\n-------настройка sshuser-------------\n\n# ИЗМЕНЕНО (Вариант 4): UID = 2014 (было 2026)\nuseradd -u 2014 sshuser\necho \"sshuser:P@ssw0rd\" | chpasswd\nusermod -aG wheel sshuser\necho \"WHEEL_USERS ALL=(ALL:ALL) NOPASSWD: ALL\" > /etc/sudoers.d/sshuser\nsu -l sshuser\nsudo id\n\n--------настройка SSH----------------\n\necho \"Authorized access only\" > /etc/openssh/banner\n\n# ИЗМЕНЕНО (Вариант 4): порт SSH = 2014 (было 2026)\necho -e \"Port 2014\\nMaxAuthTries 2\\nAllowUsers sshuser\\nBanner /etc/openssh/banner\\n\" >> /etc/openssh/sshd_config\nsystemctl restart sshd\nss -ltnp | grep sshd\n\nssh sshuser@127.0.0.1 -p 2014\n\n-------установка необходимого ПО-------\n\napt-get update && apt-get install bind bind-utils -y\n\n--------смена DNS-----------\necho $'search au-team.irpo\\nnameserver 127.0.0.1' > /etc/net/ifaces/enp7s1/resolv.conf\n\n--------BIND9---------------\n\nrndc-confgen -a -c /etc/bind/rndc.key\n\n+++\ncat <<'EOF' > /etc/bind/options.conf\nlogging { };\noptions {\n listen-on { any; 127.0.0.1; };\n forwarders { 77.88.8.7; 77.88.8.3; };\n recursion yes;\n allow-recursion { any; };\n allow-query { any; };\n dnssec-validation no;\n\n directory \"/etc/bind/zone\";\n dump-file \"/var/run/named/named_dump.db\";\n statistics-file \"/var/run/named/named.stats\";\n recursing-file \"/var/run/named/named.recursing\";\n secroots-file \"/var/run/named/named.scroots\";\n pid-file none;\n};\nzone \"au-team.irpo\" {\n type master;\n file \"au-team.irpo\";\n};\nzone \"168.192.in-addr.arpa\" {\n type master;\n file \"168.192.in-addr.arpa\";\n};\nEOF\n+++\n\nsed -i '1d' /etc/bind/options.conf\n\n+++\ncat <<'EOF' > /etc/bind/zone/au-team.irpo\n$TTL  1D\n@    IN   SOA   au-team.irpo. root.au-team.irpo. (\n                2025020600 ; serial\n                12H        ; refresh\n                1H         ; retry\n                1W         ; expire\n                1H         ; ncache\n            )\n@       IN  NS    hq-srv.au-team.irpo.\nhq-rtr  IN   A    192.168.100.1\nhq-srv  IN   A    192.168.100.2\nhq-cli  IN   A    192.168.200.2\nbr-rtr  IN   A    192.168.3.1\nbr-srv  IN   A    192.168.3.2\ndocker  IN   A    172.16.70.1\nweb     IN   A    172.16.80.1\nEOF\n+++\n# ИЗМЕНЕНО (Вариант 4): docker → интерфейс ISP к HQ-RTR = 172.16.70.1\n# ИЗМЕНЕНО (Вариант 4): web   → интерфейс ISP к BR-RTR = 172.16.80.1\n\n\n+++\ncat <<'EOF' > /etc/bind/zone/168.192.in-addr.arpa\n$TTL  1D\n@    IN   SOA   au-team.irpo. root.au-team.irpo. (\n                2025020600 ; serial\n                12H        ; refresh\n                1H         ; retry\n                1W         ; expire\n                1H         ; ncache\n            )\n      IN   NS    au-team.irpo.\n1.100 IN   PTR   hq-rtr.au-team.irpo.\n2.100 IN   PTR   hq-srv.au-team.irpo.\n2.200 IN   PTR   hq-cli.au-team.irpo.\nEOF\n+++\n\nchown :named /etc/bind/zone/au-team.irpo /etc/bind/zone/168.192.in-addr.arpa\nsystemctl enable --now bind\n\nservice network restart\nhost br-rtr\nhost -t PTR 192.168.100.2\n"}, {"file": "05_BR-SRV_HQ-CLI.txt", "raw": "05_BR-SRV_HQ-CLI.txt", "content": "==========BR-SRV==========\n[Вариант 4 | В4_КОД 09.02.06-1-2026-БУ]\n\nroot/toor\n\n-------имя хоста/NTP---------\nhostnamectl hostname BR-SRV.au-team.irpo\nexec bash\ntimedatectl set-timezone Europe/Kaliningrad\n\n-------настройка интерфейсов-------------\n\necho 'TYPE=eth' > /etc/net/ifaces/enp7s1/options\n# Сеть к BR-SRV: /28 (не более 16 адресов), BR-RTR = .1, BR-SRV = .2\necho '192.168.3.2/28' > /etc/net/ifaces/enp7s1/ipv4address\necho 'default via 192.168.3.1' > /etc/net/ifaces/enp7s1/ipv4route\necho $'search au-team.irpo\\nnameserver 192.168.100.2' > /etc/net/ifaces/enp7s1/resolv.conf\nsystemctl restart network\nping hq-srv -c 3\n\n-------настройка sshuser-------------\n\n# ИЗМЕНЕНО (Вариант 4): UID = 2014 (было 2026)\nuseradd -u 2014 sshuser\necho \"sshuser:P@ssw0rd\" | chpasswd\nusermod -aG wheel sshuser\necho \"WHEEL_USERS ALL=(ALL:ALL) NOPASSWD: ALL\" > /etc/sudoers.d/sshuser\nsu -l sshuser\nsudo id\n\n--------настройка SSH----------------\n\necho \"Authorized access only\" > /etc/openssh/banner\n\n# ИЗМЕНЕНО (Вариант 4): порт SSH = 2014 (было 2026)\necho -e \"Port 2014\\nMaxAuthTries 2\\nAllowUsers sshuser\\nBanner /etc/openssh/banner\\n\" >> /etc/openssh/sshd_config\nsystemctl restart sshd\nss -ltnp | grep sshd\n\n\n==========HQ-CLI==========\n[Вариант 4 | В4_КОД 09.02.06-1-2026-БУ]\n\n# ВАЖНО: СТАВИМ ТЕГ VLAN 214 НА ИНТЕРФЕЙС В PROXMOX (было 200)\n\n-------имя хоста/NTP---------\nhostnamectl hostname HQ-CLI.au-team.irpo\nexec bash\ntimedatectl set-timezone Europe/Kaliningrad\nip -br -c a\n\n# HQ-CLI получает адрес по DHCP от HQ-RTR (vlan214)\n# Ожидаемый адрес: 192.168.200.2\n# Шлюз: 192.168.200.1\n# DNS: 192.168.100.2\n"}]}, {"module": "Модуль 2", "files": [{"file": "00_ИЗМЕНЕНИЯ_Модуль2_Вариант4.txt", "raw": "00_#U0418#U0417#U041c#U0415#U041d#U0415#U041d#U0418#U042f_#U041c#U043e#U0434#U0443#U043b#U044c2_#U0412#U0430#U0440#U0438#U0430#U043d#U04424.txt", "content": "====================================================\nМОДУЛЬ 2 — Вариант 4 (В4_КОД 09.02.06-1-2026-БУ)\nИзменения относительно старых инструкций\n====================================================\n\n!!! ВАЖНО !!!\nМодуль 2 выполняется на ОТДЕЛЬНОМ преднастроенном стенде.\nПреднастроены: IP-адреса, маски, шлюзы, NAT, IP-туннель,\nдинамическая маршрутизация, пользователи (sshuser/net_admin),\nSSH-порты, DHCP, DNS, 3 доп. диска на HQ-SRV.\n\nАдресация стенда М2 ОТЛИЧАЕТСЯ от модуля 1!\nПЕРЕД НАСТРОЙКОЙ проверьте реальные адреса:\n  ip -br a\n  cat /etc/resolv.conf\n  cat /etc/dnsmasq.conf      (на HQ-RTR)\n  ip r\n\n========================================\nАдресация стенда М2 (из рабочих инструкций — ПРОВЕРИТЬ!)\n========================================\n  ISP ↔ HQ-RTR:  172.16.1.0/x   ISP=172.16.1.1,  HQ-RTR(WAN)=172.16.1.10\n  ISP ↔ BR-RTR:  172.16.2.0/x   ISP=172.16.2.1,  BR-RTR(WAN)=172.16.2.10\n  HQ LAN:        HQ-RTR=192.168.1.1,  HQ-SRV=192.168.1.10\n  HQ-CLI сеть:   192.168.2.0/27\n  BR LAN:        BR-RTR=192.168.3.1,  BR-SRV=192.168.3.10\n\n========================================\nТАБЛИЦА ИЗМЕНЕНИЙ старое → Вариант 4\n========================================\n\n  Параметр                  Старое        Вариант 4\n  ─────────────────────────────────────────────────────\n  Порт веб-приложения       8080          8084\n  SSH-порт (проброс)        2026          2014\n  RAID уровень              0             5\n  RAID устройство           md0           md4\n  Кол-во дисков в RAID      2             3\n  Стратум NTP (ISP)         5             9\n  БД в docker               mariadb       postgresql\n  Контейнер приложения      testapp       site\n  Контейнер БД              db            db (без изм.)\n  Имя БД (docker)           testdb        testdb4\n  Пользователь БД (docker)  test          test4\n  Пользователь БД (web)     web           web4\n  Логин web-аутентификации  WEB           Erofey\n  Файлы веб (HQ-SRV)        logo.png      директория images\n\n========================================\nСоответствие файлов и пунктов ведомости\n========================================\n  01_ISP.txt           → 2.4 (NTP/chrony), 2.11 (nginx прокси), 2.12 (web-auth)\n  02_HQ-RTR_BR-RTR.txt → 2.9 (проброс портов), 2.4 (NTP-клиент BR-RTR)\n  03_BR-SRV.txt        → 2.1/2.2/2.10 (Samba DC), 2.6 (ansible), 2.7 (docker)\n  03_docker-compose.yml→ 2.7 (стек контейнеров)\n  04_HQ-SRV_HQ-CLI.txt → 2.5 (RAID), 2.3 (NFS), 2.8 (web), 2.13 (браузер)\n"}, {"file": "01_ISP.txt", "raw": "01_ISP.txt", "content": "==========ISP — Модуль 2 — Вариант 4==========\n1) Служба сетевого времени chrony (стратум 9)\n2) Веб-сервер nginx как обратный прокси\n3) Web-based аутентификация\n\n# Преднастройка стенда: адреса/NAT/маршрутизация уже заданы.\n# Проверьте перед началом:  ip -br a ; ip r\n\n========================================\n2.4 — CHRONY (NTP-сервер, стратум 9)\n========================================\n\n# ИЗМЕНЕНО (В4): стратум 9 (было 5)\n\n# Вышестоящий сервер — на выбор (pool/любой). Стратум сервера = 9.\nsed -i 's|^pool .*|pool pool.ntp.org iburst prefer minstratum 4|' /etc/chrony.conf\n\n# Включаем режим сервера со стратумом 9:\nsed -i 's|^#\\?local stratum .*|local stratum 9|' /etc/chrony.conf\ngrep -E \"^local stratum\" /etc/chrony.conf || echo \"local stratum 9\" >> /etc/chrony.conf\n\n# Разрешаем клиентам из сетей офисов (ОБЯЗАТЕЛЬНО, иначе клиенты не синхронятся!):\necho \"allow all\" >> /etc/chrony.conf\n# (или точнее: echo \"allow 172.16.0.0/16\" >> /etc/chrony.conf ;\n#               echo \"allow 192.168.0.0/16\" >> /etc/chrony.conf)\n\nsystemctl restart chronyd\nsystemctl enable chronyd\nchronyc sources\nchronyc tracking            # проверить Stratum\n\n========================================\n2.11 + 2.12 — NGINX (обратный прокси + auth)\n========================================\n\napt-get update && apt-get install nginx -y\n\n# ИЗМЕНЕНО (В4): порт приложения 8084 (было 8080), логин Erofey (было WEB)\n#\n# web.au-team.irpo    → веб-приложение на HQ-SRV (apache:80 через HQ-RTR:8084)\n# docker.au-team.irpo → контейнер site на BR-SRV (через BR-RTR:8084)\n#\n# Адреса 172.16.1.10 / 172.16.2.10 — WAN маршрутизаторов. ПРОВЕРИТЬ на стенде!\n\ncat << \"EOF\" > /etc/nginx/sites-available.d/r-proxy.conf\nserver {\n    listen 80;\n    server_name web.au-team.irpo;\n\n    location / {\n        proxy_pass http://172.16.1.10:8084;\n        proxy_set_header Host $host;\n        proxy_set_header X-Real-IP $remote_addr;\n        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n        proxy_set_header X-Forwarded-Proto $scheme;\n\n        auth_basic \"Restricted Access\";\n        auth_basic_user_file /etc/nginx/.htpasswd;\n    }\n}\n\nserver {\n    listen 80;\n    server_name docker.au-team.irpo;\n\n    location / {\n        proxy_pass http://172.16.2.10:8084;\n        proxy_set_header Host $host;\n        proxy_set_header X-Real-IP $remote_addr;\n        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\n        proxy_set_header X-Forwarded-Proto $scheme;\n    }\n}\nEOF\n\nln -s /etc/nginx/sites-available.d/r-proxy.conf /etc/nginx/sites-enabled.d/\n\n# --- Web-based аутентификация (логин Erofey) ---\napt-get install apache2-htpasswd -y\nhtpasswd -c /etc/nginx/.htpasswd Erofey\n# ввести пароль: P@ssw0rd\ncat /etc/nginx/.htpasswd\n\nnginx -t\nsystemctl enable --now nginx\nsystemctl status nginx\n\n# --- Проверка (с HQ-CLI) ---\n# http://web.au-team.irpo    → запрос Erofey/P@ssw0rd → сайт HQ-SRV\n# http://docker.au-team.irpo → контейнер site на BR-SRV\n"}, {"file": "02_HQ-RTR_BR-RTR.txt", "raw": "02_HQ-RTR_BR-RTR.txt", "content": "==========HQ-RTR & BR-RTR — Модуль 2 — Вариант 4==========\n1) Статическая трансляция портов: 8084 (web/app) и 2014 (ssh)\n2) NTP-клиент на BR-RTR (chrony → ISP)\n\n# ИЗМЕНЕНО (В4): порт приложения 8084 (было 8080), ssh 2014 (было 2026)\n# Адреса HQ-SRV=192.168.1.10, BR-SRV=192.168.3.10 — ПРОВЕРИТЬ на стенде!\n\n==========HQ-RTR==========\n\n# Проброс:\n#   внешний 2014 → HQ-SRV:2014  (ssh)\n#   внешний 8084 → HQ-SRV:80    (apache веб-приложение)\n\nnft add chain nat prerouting { type nat hook prerouting priority dstnat \\; }\nnft add rule nat prerouting iif \"enp7s1\" tcp dport 2014 dnat to 192.168.1.10:2014\nnft add rule nat prerouting iif \"enp7s1\" tcp dport 8084 dnat to 192.168.1.10:80\n\nnft list ruleset\nnft list ruleset > /etc/nftables/nftables.nft\nsystemctl restart nftables\nnft list ruleset\n\n==========BR-RTR==========\n\n# Проброс:\n#   внешний 2014 → BR-SRV:2014  (ssh)\n#   внешний 8084 → BR-SRV:8084  (опубликованный порт контейнера site)\n\nnft add chain nat prerouting { type nat hook prerouting priority dstnat \\; }\nnft add rule nat prerouting iif \"enp7s1\" tcp dport 2014 dnat to 192.168.3.10:2014\nnft add rule nat prerouting iif \"enp7s1\" tcp dport 8084 dnat to 192.168.3.10:8084\n\nnft list ruleset\nnft list ruleset > /etc/nftables/nftables.nft\nsystemctl restart nftables\nnft list ruleset\n\n# --- NTP-клиент BR-RTR (chrony → ISP) ---\n# ИЗМЕНЕНО (В4): стратум на сервере 9; здесь указываем ISP как сервер\nsed -i 's|^pool .*|server 172.16.2.1 iburst|' /etc/chrony.conf\n# (172.16.2.1 — ISP со стороны BR; ПРОВЕРИТЬ. При недоступности — 172.16.1.1)\nsystemctl restart chronyd\nchronyc sources\n"}, {"file": "03_BR-SRV.txt", "raw": "03_BR-SRV.txt", "content": "==========BR-SRV — Модуль 2 — Вариант 4==========\n1) Контроллер домена Samba DC\n2) Ansible\n3) Веб-приложение в docker (site + postgresql)\n\n# Адреса: HQ-SRV=192.168.1.10, HQ-RTR=192.168.1.1, BR-RTR=192.168.3.1,\n#         BR-SRV=192.168.3.10 — ПРОВЕРИТЬ на стенде (ip -br a)!\n\n==========DOMAIN (Samba DC)==========\n\n# Домен au-team.irpo\n\n# Временно указываем себя на внешний DNS для установки:\necho \"nameserver 192.168.1.10\" >> /etc/net/ifaces/enp7s1/resolv.conf\nsystemctl restart network\ncat /etc/resolv.conf\nping ya.ru -c 2\n\napt-get update && apt-get install -y task-samba-dc\n\n# Очистка перед provision:\nrm -f /etc/samba/smb.conf\nrm -rf /var/lib/samba /var/cache/samba\nmkdir -p /var/lib/samba/sysvol\n\n# Развёртывание домена (интерактивно):\nsamba-tool domain provision\n#   Realm:        AU-TEAM.IRPO\n#   Domain:       AU-TEAM\n#   Server Role:  dc\n#   DNS backend:  SAMBA_INTERNAL\n#   DNS forwarder: 77.88.8.8 (или другой)\n#   Administrator password: P@ssw0rd\n\nmv /etc/krb5.conf /etc/krb5.conf.back\ncp /var/lib/samba/private/krb5.conf /etc/krb5.conf\n\nsystemctl enable --now samba\nsystemctl status samba\n\nsamba-tool domain info 127.0.0.1\n\n---------DNS-записи (А) для устройств вне домена---------\n# Имена записей — БЕЗ суффикса (.au-team.irpo добавится автоматически)\n# Адреса web/docker = интерфейсы ISP (обратный прокси). ПРОВЕРИТЬ на стенде!\n\nsamba-tool dns add 127.0.0.1 au-team.irpo hq-srv A 192.168.1.10 -U Administrator\nsamba-tool dns add 127.0.0.1 au-team.irpo hq-rtr A 192.168.1.1  -U Administrator\nsamba-tool dns add 127.0.0.1 au-team.irpo br-rtr A 192.168.3.1  -U Administrator\nsamba-tool dns add 127.0.0.1 au-team.irpo web    A 172.16.1.1   -U Administrator\nsamba-tool dns add 127.0.0.1 au-team.irpo docker A 172.16.2.1   -U Administrator\n# пароль: P@ssw0rd\n\nsamba-tool dns query 127.0.0.1 au-team.irpo @ ALL -U Administrator\n\n# Возвращаем DNS на себя (samba-DC):\nsed -i 's/nameserver 192.168.1.10/nameserver 127.0.0.1/' /etc/net/ifaces/enp7s1/resolv.conf\nsystemctl restart network\ncat /etc/resolv.conf\n\n---------Пользователи и группа---------\nsamba-tool group add hq\n\nfor i in {1..5}; do samba-tool user add hquser$i P@ssw0rd; done\n# при ошибке сложности пароля — добавить --use-username-as-cn или ослабить политику:\n# samba-tool domain passwordsettings set --complexity=off\n\nfor i in {1..5}; do samba-tool group addmembers hq hquser$i; done\nsamba-tool group listmembers hq\n\n==========Ansible==========\n\napt-get install ansible sshpass -y\n\n# Рабочий каталог — /etc/ansible\nmkdir -p /etc/ansible\n\ncat << 'EOF' > /etc/ansible/ansible.cfg\n[defaults]\ninventory = /etc/ansible/hosts\nhost_key_checking = False\ninterpreter_python = /usr/bin/python3\nEOF\n\n# ИЗМЕНЕНО (В4): ssh-порт HQ-SRV = 2014 (было 2026)\n# Логины/пароли — ПРОВЕРИТЬ на стенде! (серверы: sshuser/P@ssw0rd либо user/resu)\ncat << EOF > /etc/ansible/hosts\nHQ-SRV ansible_host=192.168.1.10 ansible_user=sshuser ansible_password=P@ssw0rd ansible_port=2014\nHQ-CLI ansible_host=192.168.2.10 ansible_user=sshuser ansible_password=P@ssw0rd\nHQ-RTR ansible_host=192.168.1.1  ansible_user=net_admin ansible_password=P@ssw0rd\nBR-RTR ansible_host=192.168.3.1  ansible_user=net_admin ansible_password=P@ssw0rd\nEOF\n\n# Проверка (все 4 хоста должны вернуть pong):\nansible all -m ping\n\n==========Docker==========\n\napt-get install docker-engine docker-compose-v2 -y\nsystemctl enable --now docker.service\n\n# Монтируем Additional.iso, читаем readme:\nmount -o loop /dev/sr0 /mnt/ -v\nls -l /mnt/docker/\ncat /mnt/docker/readme.txt     # !!! ВАЖНО: точные имена образов, портов, env-переменных !!!\n\n# ИЗМЕНЕНО (В4): postgresql вместо mariadb\ndocker load < /mnt/docker/site_latest.tar\ndocker load < /mnt/docker/postgresql_latest.tar\ndocker image ls                # запомнить точные REPOSITORY:TAG для compose\n\n# docker-compose.yml — см. отдельный файл 03_docker-compose.yml\ndocker compose config\ndocker compose up -d\ndocker ps\nss -ltnp4 | grep 8084\n\n# Проверка с HQ-CLI: http://docker.au-team.irpo и http://192.168.3.10:8084\n# создать тестовую запись, при необходимости пересоздать стек:\n#   docker rm -f $(docker ps -qa)\n#   docker compose up -d\n\n# --- NTP-клиент BR-SRV → ISP ---\nsed -i 's|^pool .*|server 172.16.2.1 iburst|' /etc/chrony.conf\nsystemctl restart chronyd && chronyc sources\n\n==========HQ-CLI: ввод в домен==========\n# (выполняется на машине HQ-CLI)\n\n# 1) На HQ-RTR переключить выдаваемый DHCP DNS на samba-DC (BR-SRV):\n#    sed -i 's/192.168.1.10/192.168.3.10/' /etc/dnsmasq.conf\n#    systemctl restart dnsmasq\n#    cat /etc/dnsmasq.conf\n\n# 2) На HQ-CLI обновить сеть и DNS, проверить разрешение домена:\n#    systemctl restart network\n#    cat /etc/resolv.conf          # должен быть 192.168.3.10\n#    nslookup au-team.irpo\n\n# 3) Ввод в домен (ALT):\n#    apt-get update && apt-get install -y task-auth-ad-sssd\n#    system-auth write ad au-team.irpo AU-TEAM hq-cli\n#    (ввести пароль Administrator: P@ssw0rd)\n#    systemctl restart sssd\n#    альтернатива: ЦУС → Аутентификация → домен Active Directory\n\n# 4) Проверка доменных пользователей:\n#    getent passwd hquser1@au-team.irpo\n#    id hquser1@au-team.irpo\n\n# 5) Права sudo только для cat/grep/id для группы hq:\n#    control libnss-role\n#    roleadd hq wheel\n#    echo \"WHEEL_USERS ALL=(ALL:ALL) /usr/bin/cat, /usr/bin/grep, /usr/bin/id\" > /etc/sudoers.d/hq_limited\n#    visudo -cf /etc/sudoers.d/hq_limited\n#    (если есть конфликтующее \"WHEEL_USERS ... NOPASSWD: ALL\" на HQ-CLI — убрать)\n#    Вход доменным пользователем → sudo id (работает), sudo ls (запрещено)\n"}, {"file": "03_docker-compose.yml", "raw": "03_docker-compose.yml", "content": "# ==========docker-compose.yml — Модуль 2 — Вариант 4==========\n#\n# ИЗМЕНЕНО (В4): postgresql (было mariadb), контейнер site (было testapp),\n#               testdb4 / test4 (было testdb / test), порт 8084 (было 8080)\n#\n# !!! ОБЯЗАТЕЛЬНО сверьте с /mnt/docker/readme.txt:\n#     - точное имя образов (REPOSITORY:TAG из `docker image ls`)\n#     - внутренний порт приложения (здесь 8000 — может отличаться)\n#     - имена env-переменных приложения site (DB_HOST/DB_TYPE и т.д.)\n#     - имена env-переменных postgres (POSTGRES_* — стандарт офиц. образа)\n\ncat << EOF > docker-compose.yml\nservices:\n  db:\n    container_name: db\n    image: postgres:latest          # ← заменить на реальное имя из docker image ls\n    restart: always\n    environment:\n      POSTGRES_DB: testdb4\n      POSTGRES_USER: test4\n      POSTGRES_PASSWORD: P@ssw0rd\n    volumes:\n      - db_data:/var/lib/postgresql/data\n\n  site:\n    container_name: site\n    image: site:latest              # ← заменить на реальное имя из docker image ls\n    restart: always\n    ports:\n      - \"8084:8000\"                 # внешний:внутренний (внутренний сверить с readme)\n    environment:\n      DB_HOST: db\n      DB_PORT: 5432\n      DB_NAME: testdb4\n      DB_USER: test4\n      DB_PASS: P@ssw0rd\n      DB_TYPE: pgsql                # ← возможно postgres/postgresql, сверить с readme\n    depends_on:\n      - db\n\nvolumes:\n  db_data:\nEOF\n"}, {"file": "04_HQ-SRV_HQ-CLI.txt", "raw": "04_HQ-SRV_HQ-CLI.txt", "content": "==========HQ-SRV & HQ-CLI — Модуль 2 — Вариант 4==========\n1) Файловое хранилище RAID-5 (md4)\n2) Сервер NFS\n3) Веб-приложение (apache + mariadb)\n\n# --- NTP-клиент HQ-SRV → ISP ---\nsed -i 's|^pool .*|server 172.16.1.1 iburst|' /etc/chrony.conf\nsystemctl restart chronyd && chronyc sources\n\n==========RAID (2.5)==========\n\n# ИЗМЕНЕНО (В4): уровень 5, 3 диска, устройство md4 (было RAID0, 2 диска, md0)\n\nlsblk            # определить реальные имена дисков (sdb/sdc/sdd или vdb/vdc/vdd)\n\n# Разметка трёх дисков (поправьте имена при необходимости):\nfor d in sdb sdc sdd; do\n  parted -s /dev/$d mklabel msdos\n  parted -s /dev/$d mkpart primary 1MiB 100%\n  parted -s /dev/$d set 1 raid on\ndone\nlsblk\n\n# Создание RAID-5 (имя массива — md4):\nmdadm --create /dev/md4 --level=5 --raid-devices=3 /dev/sdb1 /dev/sdc1 /dev/sdd1\ncat /proc/mdstat                 # дождаться синхронизации (resync)\n\n# Сохранить конфигурацию массива:\nmdadm --detail --scan | tee -a /etc/mdadm.conf\n\n# Файловая система ext4 + автомонтирование в /raid:\nmkfs.ext4 /dev/md4\nmkdir -p /raid\ncp /etc/fstab /etc/fstab.back\necho \"/dev/md4 /raid ext4 defaults 0 0\" >> /etc/fstab\nmount -av\ndf -hT /raid\n\n==========NFS (2.3)==========\n\napt-get update && apt-get install nfs-server nfs-utils -y\n\nmkdir -p /raid/nfs\nchmod 777 /raid/nfs\n\n# Доступ rw ТОЛЬКО для сети в сторону HQ-CLI (192.168.2.0/27 — ПРОВЕРИТЬ!):\ncp /etc/exports /etc/exports.back\necho \"/raid/nfs 192.168.2.0/27(rw,no_subtree_check,no_root_squash)\" >> /etc/exports\n\nsystemctl enable --now nfs-server\nexportfs -rav\nexportfs -v\n\n==========WEB App (2.8)==========\n\n# ИЗМЕНЕНО (В4): пользователь БД web4 (было web), копируем директорию images\n\nmount -o loop /dev/sr0 /mnt/ -v\nls -l /mnt/web/                  # проверить состав: index.php, images/, dump.sql\napt-get install lamp-server -y\n\ncp /mnt/web/index.php /var/www/html/\ncp -r /mnt/web/images /var/www/html/\n\nsystemctl enable --now mariadb\n\nmariadb -e \"CREATE DATABASE webdb;\"\nmariadb -e \"\nCREATE USER 'web4'@'localhost' IDENTIFIED BY 'P@ssw0rd';\nGRANT ALL PRIVILEGES ON webdb.* TO 'web4'@'localhost';\nFLUSH PRIVILEGES;\n\"\n\nmariadb webdb < /mnt/web/dump.sql\nmariadb -e \"USE webdb; SHOW TABLES;\"\n\n# Указать учётные данные в index.php:\nvim /var/www/html/index.php\n#   $servername = \"localhost\";\n#   $username   = \"web4\";\n#   $password   = \"P@ssw0rd\";\n#   $dbname     = \"webdb\";\n\nsystemctl enable --now httpd2.service\nsystemctl status httpd2.service\n\n# Проверка локально:\ncurl -s http://localhost/ | head\n\n==========HQ-CLI (2.3 авто-монтирование NFS + 2.13 браузер)==========\n\n# --- Автомонтирование NFS ---\nmkdir -p /mnt/nfs\nchmod -R 777 /mnt/nfs\nshowmount -e hq-srv               # или showmount -e 192.168.1.10\ncp /etc/fstab /etc/fstab.back\necho \"192.168.1.10:/raid/nfs /mnt/nfs nfs rw,soft,_netdev 0 0\" >> /etc/fstab\nmount -av\ndf -hT /mnt/nfs\n# создать файл в /mnt/nfs → проверить на HQ-SRV в /raid/nfs\n\n# --- Яндекс Браузер (2.13) ---\napt-get update && apt-get install yandex-browser-stable -y\n\n# --- NTP-клиент HQ-CLI → ISP ---\nsed -i 's|^pool .*|server 172.16.1.1 iburst|' /etc/chrony.conf\nsystemctl restart chronyd && chronyc sources\n\n# --- Проверка web-приложения и прокси ---\n# В браузере: http://web.au-team.irpo → Erofey/P@ssw0rd → приложение HQ-SRV\n"}]}]</script>

const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];

function labelFor(name){
  let n=name.replace(/\.(txt|yml|yaml)$/i,'');
  if(/^00_ИЗМЕН/i.test(n)) return 'Изменения';
  if(/^ПРОВЕРКА/i.test(n)) return 'Проверка';
  if(/docker-compose/i.test(n)) return 'docker-compose';
  n=n.replace(/^[0-9]+_/,'').replace(/_/g,' · ');
  return n;
}
function iconFor(name){
  const n=name.toUpperCase();
  if(/ИЗМЕН/.test(n)) return 'Δ';
  if(/ПРОВЕРКА/.test(n)) return '✓';
  if(/COMPOSE|\.YML/.test(n)) return '⬡';
  if(/ISP/.test(n)) return 'IS';
  if(/HQ-RTR/.test(n)&&/BR-RTR/.test(n)) return 'RR';
  if(/HQ-RTR/.test(n)) return 'HR';
  if(/BR-RTR/.test(n)) return 'BR';
  if(/HQ-SRV/.test(n)) return 'HS';
  if(/BR-SRV/.test(n)) return 'BS';
  if(/CLI/.test(n)) return 'CL';
  return '$_';
}
function badgeFor(name){
  if(/^00_ИЗМЕН/i.test(name)) return ['Δ','b-chg'];
  if(/^ПРОВЕРКА/i.test(name)) return ['ok','b-chk'];
  if(/\.ya?ml$/i.test(name)) return ['yml','b-yml'];
  return null;
}
const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

const CMDS=['echo','cat','sed','grep','systemctl','service','nft','samba-tool','mariadb','mysql','docker','mkdir','rm','cp','mv','chmod','chown','ln','useradd','usermod','chpasswd','hostnamectl','timedatectl','apt-get','apt','ip','ping','ss','host','nslookup','dig','vtysh','rndc-confgen','htpasswd','nginx','parted','mdadm','mkfs.ext4','mount','df','lsblk','exportfs','showmount','su','sudo','id','xargs','tee','curl','wget','for','do','done','vim','nano','control','roleadd','sysctl','chronyc','system-auth','named-checkconf','named-checkzone','exec'];
const cmdRe=new RegExp('\\b('+CMDS.map(c=>c.replace(/[.]/g,'\\.')).join('|')+')\\b','g');

function hl(line){
  const t=line.trim();
  if(/^={3,}.*={3,}$/.test(t)) return '<span class="c-banner">'+esc(line)+'</span>';
  if(/^=+$/.test(t)&&t.length>2) return '<span class="c-banner">'+esc(line)+'</span>';
  if(/^\++$/.test(t)) return '<span class="c-plus">'+esc(line)+'</span>';
  if(/^-{3,}.*-{3,}$/.test(t)||/^-{4,}$/.test(t)) return '<span class="c-sub">'+esc(line)+'</span>';
  if(/^#{4,}/.test(t)) return '<span class="c-banner">'+esc(line)+'</span>';
  if(/^[\s│─┌┐└┘├┤┬┴┼\-]+$/.test(line)&&line.trim().length) return '<span class="c-op">'+esc(line)+'</span>';

  let s=esc(line), ci=-1;
  const m=s.match(/(^|\s)#/);
  if(m) ci=m.index+(m[1]?m[1].length:0);
  let code=s, com='';
  if(ci>=0){ code=s.slice(0,ci); com=s.slice(ci); }

  code=code
    .replace(/(&#39;[^&]*?&#39;|&quot;[^&]*?&quot;|'[^']*'|"[^"]*")/g,'<span class="c-str">$1</span>')
    .replace(/\b(\d{1,3}(?:\.\d{1,3}){3}(?:\/\d{1,2})?)\b/g,'<span class="c-num">$1</span>')
    .replace(/(\s)(--?[A-Za-z][\w-]*)/g,'$1<span class="c-flag">$2</span>')
    .replace(/\b(\d+)\b/g,'<span class="c-num">$1</span>')
    .replace(cmdRe,'<span class="c-cmd">$1</span>');

  if(com){
    const warn=/!!!|ВАЖНО|ИЗМЕН|ПРОВЕР|ОБЯЗАТ|ЗАМЕН|[Сс]верь|[Пп]роверь/.test(com);
    com='<span class="'+(warn?'c-warn':'c-com')+'">'+com+'</span>';
  }
  return code+com;
}

function renderCode(content){
  const lines=content.replace(/\s+$/,'').split('\n');
  let g='',b='';
  lines.forEach((ln,i)=>{ g+='<span>'+(i+1)+'</span>'; b+='<span class="ln">'+(hl(ln)||'&nbsp;')+'</span>'; });
  return '<div class="gutter">'+g+'</div><div class="lines">'+b+'</div>';
}

let MOD=0, FILE=-1;

function buildSidebar(){
  const wrap=$('#groups'); wrap.innerHTML='';
  DATA.forEach((mod,mi)=>{
    const g=document.createElement('div'); g.className='grp';
    g.innerHTML='<div class="grp-h"><span class="dot"></span>'+esc(mod.module)+'<svg class="chev" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M6 9l6 6 6-6"/></svg></div><div class="items"></div>';
    const items=g.querySelector('.items');
    mod.files.forEach((f,fi)=>{
      const btn=document.createElement('button'); btn.className='nav'; btn.dataset.mi=mi; btn.dataset.fi=fi;
      const bd=badgeFor(f.file);
      btn.innerHTML='<span class="ico">'+iconFor(f.file)+'</span><span class="tt"><b>'+esc(labelFor(f.file))+'</b><small>'+esc(f.file)+'</small></span>'+(bd?'<span class="badge '+bd[1]+'">'+bd[0]+'</span>':'');
      btn.onclick=()=>{ open(mi,fi); if(window.innerWidth<=860) closeSide(); };
      items.appendChild(btn);
    });
    g.querySelector('.grp-h').onclick=()=>g.classList.toggle('collapsed');
    wrap.appendChild(g);
  });
}
function setActive(){ $$('.nav').forEach(n=>n.classList.toggle('active', +n.dataset.mi===MOD && +n.dataset.fi===FILE)); }

function open(mi,fi){
  MOD=mi; FILE=fi; setActive();
  const mod=DATA[mi], f=mod.files[fi];
  const path=(mod.module+'/'+f.file).replace(/\s/g,'');
  $('#crumbs').innerHTML='<span>'+esc(mod.module)+'</span><span class="sep">/</span><b>'+esc(f.file)+'</b>';
  $('#main-scroll').scrollTop=0;
  $('#view').innerHTML=
    '<div class="wrap">'+
      '<div class="fhead"><div class="ico">'+iconFor(f.file)+'</div><div><h2>'+esc(labelFor(f.file))+'</h2><small>'+esc(f.file)+'</small></div></div>'+
      '<div class="term"><div class="term-bar"><div class="lights"><i class="l1"></i><i class="l2"></i><i class="l3"></i></div>'+
        '<span class="path">root@<b>stand</b>:~/'+esc(f.file)+'</span>'+
        '<button class="copy" id="cpy"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 012-2h10"/></svg><span>копировать</span></button></div>'+
        '<div class="code">'+renderCode(f.content)+'</div></div>'+
      '<div class="foot"><span>'+esc(path)+'</span><span>'+f.content.split('\n').length+' строк</span></div>'+
    '</div>';
  $('#cpy').onclick=()=>{ navigator.clipboard.writeText(f.content).then(()=>{ const b=$('#cpy'); b.classList.add('done'); b.querySelector('span').textContent='скопировано'; setTimeout(()=>{b.classList.remove('done');b.querySelector('span').textContent='копировать';},1600); }); };
}

  DATA.forEach((mod,mi)=>{

      '<div class="k">'+(mi===0?'Модуль 01':'Модуль 02')+'</div><h3>'+esc(mod.module)+'</h3><p>'+desc+'</p><div class="files">'+files+'</div></div>';
  });

  $('#view').innerHTML=
    '<div class="wrap"><div class="hero"><div class="eyebrow">Демонстрационный экзамен · ГИА 2026</div>'+
    '<h2>09.02.06 — Сетевое и системное<br>администрирование · <span class="v">Вариант 4</span></h2>'+
    '<p>Полные инструкции по настройке сетевой инфраструктуры и сетевого администрирования для шифра В4_КОД 09.02.06-1-2026-БУ. ALT Linux на Proxmox VE.</p>'+
    '<div class="meta-row"><span class="chip">⏱ <b>2 ч 30 мин</b></span><span class="chip">🖥 <b>6 ВМ</b></span><span class="chip">ALT Linux</span><span class="chip">Proxmox VE</span></div></div>'+

    '<div class="sec-t">Ключевые изменения варианта</div><table class="kv"><tr><th>Параметр</th><th>Было</th><th>Вариант 4</th></tr>'+rows+'</table>'+
    '<div class="foot"><span>В4_КОД 09.02.06-1-2026-БУ</span><span>'+DATA.reduce((a,m)=>a+m.files.length,0)+' файлов · 2 модуля</span></div></div>';
  $$('.card').forEach(c=>c.onclick=()=>open(+c.dataset.mi,0));
}

function doSearch(q){
  q=q.trim().toLowerCase();
  $$('.grp').forEach(g=>{
    let any=false;
    g.querySelectorAll('.nav').forEach(n=>{
      const f=DATA[+n.dataset.mi].files[+n.dataset.fi];
      const hit=!q || f.file.toLowerCase().includes(q) || labelFor(f.file).toLowerCase().includes(q) || f.content.toLowerCase().includes(q);
      n.style.display=hit?'':'none'; if(hit)any=true;
    });
    g.style.display=any?'':'none';
    if(q)g.classList.remove('collapsed');
  });
}
function closeSide(){ $('#side').classList.remove('open'); $('#scrim').classList.remove('show'); }

buildSidebar();
home();
$('#brand').onclick=home;
$('#logo-home').onclick=home;
$('#search').addEventListener('input',e=>doSearch(e.target.value));
$('#menu').onclick=()=>{ $('#side').classList.add('open'); $('#scrim').classList.add('show'); };
$('#scrim').onclick=closeSide;
</script>
